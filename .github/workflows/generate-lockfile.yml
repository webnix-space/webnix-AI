name: Generate yarn.lock
on:
  workflow_dispatch:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: yarn install
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate yarn.lock"
